services:
  - type: web
    name: talentlens-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: ../data
      - key: USE_SAMPLE
        value: "true"